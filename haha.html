<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-strong: #f8fafc;
      --text: #1f2937;
      --muted: #64748b;
      --border: #d3dce6;
      --primary: #2f80ed;
      --primary-soft: rgba(47, 128, 237, 0.12);
      --shadow: 0 18px 40px rgba(47, 64, 179, 0.08);
    }

    :root[data-theme='dark'] {
      --bg: #0f172a;
      --surface: #111827;
      --surface-strong: #1f2937;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --primary: #60a5fa;
      --primary-soft: rgba(96, 165, 250, 0.18);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(47, 128, 237, 0.18), transparent 28%),
                  radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.12), transparent 22%),
                  var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2rem, 2.5vw, 2.5rem);
    }

    header p {
      margin: 6px 0 0;
      color: var(--muted);
      max-width: 650px;
      line-height: 1.5;
    }

    .theme-toggle {
      background: var(--surface-strong);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      background: var(--surface);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(47, 128, 237, 0.25);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .card p {
      margin: 0;
      font-size: 1.9rem;
      font-weight: 700;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    form h2 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--text);
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 1rem;
      background: var(--surface-strong);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
      background: var(--surface);
    }

    button {
      background: var(--primary);
      border: none;
      color: #fff;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    button.secondary {
      background: var(--surface-strong);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: var(--surface);
    }

    .search-bar {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .search-bar input, .search-bar select {
      flex: 1;
      min-width: 220px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    th, td {
      text-align: left;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--surface-strong);
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    tr:hover td {
      background: rgba(47, 128, 237, 0.04);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .action-buttons button {
      margin-right: 10px;
      margin-bottom: 4px;
    }

    @media (max-width: 780px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
      .search-bar {
        flex-direction: column;
      }
      th, td {
        padding: 14px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Expense Tracker</h1>
        <p>Track expenses, budget, search, edit, delete, and view monthly summary.</p>
      </div>
      <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
    </header>

    <div class="dashboard">
      <div class="card">
        <h2>Total Budget</h2>
        <p id="dashboard-budget">₱0</p>
      </div>
      <div class="card">
        <h2>Total Expenses</h2>
        <p id="dashboard-expenses">₱0</p>
      </div>
      <div class="card">
        <h2>Remaining Balance</h2>
        <p id="dashboard-remaining">₱0</p>
      </div>
      <div class="card">
        <h2>Current Month</h2>
        <p id="dashboard-monthly">₱0</p>
      </div>
    </div>

    <div class="grid-2">
      <form id="budget-form">
        <h2>Set Budget</h2>
        <label for="budget-amount">Budget Amount</label>
        <input id="budget-amount" type="number" min="0" placeholder="Enter total budget" />
        <button type="submit">Save Budget</button>
      </form>

      <form id="expense-form">
        <h2 id="expense-form-title">Add Expense</h2>
        <input type="hidden" id="expense-id" />
        <label for="expense-name">Expense Name</label>
        <input id="expense-name" type="text" placeholder="e.g. Food" required />

        <label for="expense-category">Category</label>
        <select id="expense-category">
          <option value="Food">Food</option>
          <option value="Transportation">Transportation</option>
          <option value="Bills">Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Others">Others</option>
        </select>

        <label for="expense-amount">Amount</label>
        <input id="expense-amount" type="number" min="0" step="0.01" placeholder="Enter amount" required />

        <label for="expense-date">Date</label>
        <input id="expense-date" type="date" required />

        <button type="submit" id="expense-submit">Add Expense</button>
      </form>
    </div>

    <div class="search-bar">
      <input id="search-text" type="text" placeholder="Search by name or category" />
      <select id="filter-category">
        <option value="">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transportation">Transportation</option>
        <option value="Bills">Bills</option>
        <option value="Shopping">Shopping</option>
        <option value="Others">Others</option>
      </select>
      <button type="button" class="secondary" id="clear-filters">Clear Filters</button>
    </div>

    <div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expense-table-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const budgetForm = document.getElementById('budget-form');
    const expenseForm = document.getElementById('expense-form');
    const budgetAmountInput = document.getElementById('budget-amount');
    const expenseNameInput = document.getElementById('expense-name');
    const expenseCategoryInput = document.getElementById('expense-category');
    const expenseAmountInput = document.getElementById('expense-amount');
    const expenseDateInput = document.getElementById('expense-date');
    const expenseTableBody = document.getElementById('expense-table-body');
    const expenseFormTitle = document.getElementById('expense-form-title');
    const expenseSubmitButton = document.getElementById('expense-submit');
    const searchText = document.getElementById('search-text');
    const filterCategory = document.getElementById('filter-category');
    const clearFiltersButton = document.getElementById('clear-filters');
    const dashboardBudget = document.getElementById('dashboard-budget');
    const dashboardExpenses = document.getElementById('dashboard-expenses');
    const dashboardRemaining = document.getElementById('dashboard-remaining');
    const dashboardMonthly = document.getElementById('dashboard-monthly');
    const expenseIdInput = document.getElementById('expense-id');
    const themeToggle = document.getElementById('theme-toggle');

    let expenses = [];
    let budget = 0;
    let editingExpenseId = null;

    function formatCurrency(value) {
      return `₱${Number(value).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    function getStorageKey(key) {
      return `expense-tracker-${key}`;
    }

    function loadData() {
      const storedExpenses = localStorage.getItem(getStorageKey('expenses'));
      const storedBudget = localStorage.getItem(getStorageKey('budget'));
      const storedTheme = localStorage.getItem(getStorageKey('theme'));
      if (storedExpenses) {
        expenses = JSON.parse(storedExpenses);
      }
      if (storedBudget) {
        budget = Number(storedBudget);
        budgetAmountInput.value = budget;
      }
      applyTheme(storedTheme || 'light');
      renderExpenses();
      updateDashboard();
    }

    function saveData() {
      localStorage.setItem(getStorageKey('expenses'), JSON.stringify(expenses));
      localStorage.setItem(getStorageKey('budget'), budget);
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      themeToggle.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem(getStorageKey('theme'), theme);
    }

    function toggleTheme() {
      const current = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    function getTotalExpenses() {
      return expenses.reduce((sum, expense) => sum + Number(expense.amount), 0);
    }

    function getMonthlyExpenses() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth();
      return expenses.reduce((sum, expense) => {
        const expenseDate = new Date(expense.date);
        if (expenseDate.getFullYear() === currentYear && expenseDate.getMonth() === currentMonth) {
          return sum + Number(expense.amount);
        }
        return sum;
      }, 0);
    }

    function updateDashboard() {
      const totalExpenses = getTotalExpenses();
      dashboardBudget.textContent = formatCurrency(budget);
      dashboardExpenses.textContent = formatCurrency(totalExpenses);
      dashboardRemaining.textContent = formatCurrency(Math.max(0, budget - totalExpenses));
      dashboardMonthly.textContent = formatCurrency(getMonthlyExpenses());
    }

    function renderExpenses() {
      const search = searchText.value.trim().toLowerCase();
      const category = filterCategory.value;
      expenseTableBody.innerHTML = '';

      const filteredExpenses = expenses.filter(expense => {
        const matchesSearch = expense.name.toLowerCase().includes(search) || expense.category.toLowerCase().includes(search);
        const matchesCategory = category === '' || expense.category === category;
        return matchesSearch && matchesCategory;
      });

      if (filteredExpenses.length === 0) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 5;
        cell.textContent = 'No expenses found.';
        row.appendChild(cell);
        expenseTableBody.appendChild(row);
        return;
      }

      filteredExpenses.forEach(expense => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${expense.name}</td>
          <td>${expense.category}</td>
          <td>${formatCurrency(expense.amount)}</td>
          <td>${expense.date}</td>
          <td class="action-buttons">
            <button type="button" onclick="editExpense('${expense.id}')">Edit</button>
            <button type="button" class="secondary" onclick="deleteExpense('${expense.id}')">Delete</button>
          </td>
        `;
        expenseTableBody.appendChild(row);
      });
    }

    function resetExpenseForm() {
      expenseIdInput.value = '';
      expenseNameInput.value = '';
      expenseCategoryInput.value = 'Food';
      expenseAmountInput.value = '';
      expenseDateInput.value = '';
      editingExpenseId = null;
      expenseFormTitle.textContent = 'Add Expense';
      expenseSubmitButton.textContent = 'Add Expense';
    }

    budgetForm.addEventListener('submit', function(event) {
      event.preventDefault();
      budget = Number(budgetAmountInput.value) || 0;
      saveData();
      updateDashboard();
    });

    expenseForm.addEventListener('submit', function(event) {
      event.preventDefault();
      const name = expenseNameInput.value.trim();
      const category = expenseCategoryInput.value;
      const amount = Number(expenseAmountInput.value);
      const date = expenseDateInput.value;

      if (!name || !date || amount <= 0) {
        return;
      }

      if (editingExpenseId) {
        const item = expenses.find(expense => expense.id === editingExpenseId);
        if (item) {
          item.name = name;
          item.category = category;
          item.amount = amount;
          item.date = date;
        }
      } else {
        expenses.push({
          id: `expense-${Date.now()}`,
          name,
          category,
          amount,
          date
        });
      }

      saveData();
      renderExpenses();
      updateDashboard();
      resetExpenseForm();
    });

    searchText.addEventListener('input', renderExpenses);
    filterCategory.addEventListener('change', renderExpenses);
    clearFiltersButton.addEventListener('click', function() {
      searchText.value = '';
      filterCategory.value = '';
      renderExpenses();
    });

    themeToggle.addEventListener('click', toggleTheme);

    window.editExpense = function(id) {
      const expense = expenses.find(item => item.id === id);
      if (!expense) return;
      editingExpenseId = id;
      expenseIdInput.value = id;
      expenseNameInput.value = expense.name;
      expenseCategoryInput.value = expense.category;
      expenseAmountInput.value = expense.amount;
      expenseDateInput.value = expense.date;
      expenseFormTitle.textContent = 'Edit Expense';
      expenseSubmitButton.textContent = 'Save Changes';
    };

    window.deleteExpense = function(id) {
      expenses = expenses.filter(expense => expense.id !== id);
      saveData();
      renderExpenses();
      updateDashboard();
      if (editingExpenseId === id) {
        resetExpenseForm();
      }
    };

    loadData();
  </script>
</body>
</html>
