<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        :root {
            --bg: #f2f4f8;
            --card: #ffffff;
            --text: #212121;
            --muted: #545859;
            --border: #d6d8dd;
            --accent: #0066cc;
            --danger: #d62828;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .dark {
            --bg: #11171f;
            --card: #1f2937;
            --text: #f5f7fa;
            --muted: #a4acc4;
            --border: #334155;
            --accent: #60a5fa;
            --danger: #f87171;
        }
        .page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 24px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        h1 {
            margin: 0;
            font-size: 28px;
        }
        .button {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .button:hover {
            background: #185dff;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            margin-top: 20px;
        }
        .grid {
            display: grid;
            gap: 20px;
        }
        .grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .dashboard-item {
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--bg);
        }
        .dashboard-item h3 {
            margin: 0 0 12px;
            font-size: 16px;
            color: var(--muted);
        }
        .dashboard-item p {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }
        form {
            display: grid;
            gap: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--muted);
        }
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            box-sizing: border-box;
        }
        .controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 16px;
        }
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        th, td {
            text-align: left;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--muted);
            font-weight: 600;
        }
        tr:hover {
            background: rgba(0,0,0,0.03);
        }
        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            display: inline-block;
        }
        .badge-others { background: #e2e8f0; color: #1e293b; }
        .badge-food { background: #fed7aa; color: #7c2d12; }
        .badge-transportation { background: #bbf7d0; color: #134e4a; }
        .badge-bills { background: #c7d2fe; color: #312e81; }
        .badge-shopping { background: #fbcfe8; color: #831843; }
        .actions button {
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--accent);
            margin-right: 8px;
        }
        .actions button.delete {
            color: var(--danger);
        }
        .footer-note {
            margin-top: 12px;
            color: var(--muted);
            font-size: 14px;
        }
        @media (max-width: 800px) {
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <div>
                <h1>Expense Tracker</h1>
                <p class="footer-note">Track spending, manage budgets, and view monthly summaries.</p>
            </div>
            <button class="button" id="themeToggle">Dark Mode</button>
        </div>

        <div class="grid grid-3">
            <div class="dashboard-item">
                <h3>Total Budget</h3>
                <p id="budgetValue">₱0</p>
            </div>
            <div class="dashboard-item">
                <h3>Total Expenses</h3>
                <p id="totalValue">₱0</p>
            </div>
            <div class="dashboard-item">
                <h3>Remaining Balance</h3>
                <p id="remainingValue">₱0</p>
            </div>
        </div>

        <div class="card">
            <h2>New Expense</h2>
            <form id="expenseForm">
                <div class="grid" style="grid-template-columns: repeat(auto-fit,minmax(220px,1fr));">
                    <div>
                        <label for="name">Expense Name</label>
                        <input type="text" id="name" placeholder="e.g. Food" required>
                    </div>
                    <div>
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" min="0" step="0.01" placeholder="₱0.00" required>
                    </div>
                    <div>
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div>
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Bills">Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div>
                        <label for="budget">Set Budget (leave blank to keep current)</label>
                        <input type="number" id="budget" min="0" step="1" placeholder="₱5000">
                    </div>
                </div>
                <div class="controls">
                    <button class="button" type="submit" id="saveBtn">Add Expense</button>
                    <button class="button" type="button" id="clearBtn" style="background:#64748b;">Clear</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="controls">
                <div style="flex:1; min-width:200px;">
                    <label for="search">Search</label>
                    <input type="text" id="search" placeholder="Search by name or category">
                </div>
                <div style="min-width:200px;">
                    <label for="filterCategory">Filter Category</label>
                    <select id="filterCategory">
                        <option value="All">All</option>
                        <option value="Food">Food</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Bills">Bills</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Expense</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTable">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Monthly Summary</h2>
            <p class="footer-note">Current month total expenses: <strong id="monthSummary">₱0</strong></p>
        </div>
    </div>

    <script>
        const expenseForm = document.getElementById('expenseForm');
        const nameInput = document.getElementById('name');
        const amountInput = document.getElementById('amount');
        const dateInput = document.getElementById('date');
        const categoryInput = document.getElementById('category');
        const budgetInput = document.getElementById('budget');
        const expenseTable = document.getElementById('expenseTable');
        const searchInput = document.getElementById('search');
        const filterCategory = document.getElementById('filterCategory');
        const budgetValue = document.getElementById('budgetValue');
        const totalValue = document.getElementById('totalValue');
        const remainingValue = document.getElementById('remainingValue');
        const monthSummary = document.getElementById('monthSummary');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const themeToggle = document.getElementById('themeToggle');

        let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
        let budget = Number(localStorage.getItem('budget') || 0);
        let editId = null;
        let darkMode = localStorage.getItem('darkMode') === 'true';

        function formatCurrency(value) {
            return `₱${Number(value).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        function saveState() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
            localStorage.setItem('budget', budget);
            localStorage.setItem('darkMode', darkMode);
        }

        function updateDashboard() {
            const total = expenses.reduce((sum, item) => sum + Number(item.amount), 0);
            const now = new Date();
            const monthly = expenses.filter(exp => {
                const expDate = new Date(exp.date);
                return expDate.getMonth() === now.getMonth() && expDate.getFullYear() === now.getFullYear();
            }).reduce((sum, item) => sum + Number(item.amount), 0);
            budgetValue.textContent = formatCurrency(budget);
            totalValue.textContent = formatCurrency(total);
            remainingValue.textContent = formatCurrency(budget - total);
            monthSummary.textContent = formatCurrency(monthly);
        }

        function getCategoryBadge(category) {
            const key = category.toLowerCase();
            return `<span class="badge badge-${key}">${category}</span>`;
        }

        function renderExpenses() {
            const query = searchInput.value.trim().toLowerCase();
            const categoryFilter = filterCategory.value;
            const filtered = expenses.filter(exp => {
                const matchesSearch = exp.name.toLowerCase().includes(query) || exp.category.toLowerCase().includes(query);
                const matchesCategory = categoryFilter === 'All' || exp.category === categoryFilter;
                return matchesSearch && matchesCategory;
            });
            expenseTable.innerHTML = filtered.map(exp => `
                <tr>
                    <td>${exp.name}</td>
                    <td>${formatCurrency(exp.amount)}</td>
                    <td>${exp.date}</td>
                    <td>${getCategoryBadge(exp.category)}</td>
                    <td class="actions">
                        <button onclick="editExpense('${exp.id}')">Edit</button>
                        <button class="delete" onclick="deleteExpense('${exp.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
            updateDashboard();
        }

        function resetForm() {
            expenseForm.reset();
            editId = null;
            saveBtn.textContent = 'Add Expense';
        }

        function addOrUpdateExpense(event) {
            event.preventDefault();
            const name = nameInput.value.trim();
            const amount = Number(amountInput.value);
            const date = dateInput.value;
            const category = categoryInput.value;
            const budgetAmount = Number(budgetInput.value);

            if (!name || !amount || !date || !category) return;
            if (budgetInput.value.trim() !== '' && budgetAmount >= 0) {
                budget = budgetAmount;
            }
            if (editId) {
                expenses = expenses.map(item => item.id === editId ? { ...item, name, amount, date, category } : item);
            } else {
                expenses.push({ id: crypto.randomUUID(), name, amount, date, category });
            }
            saveState();
            renderExpenses();
            resetForm();
            budgetInput.value = '';
        }

        function editExpense(id) {
            const item = expenses.find(exp => exp.id === id);
            if (!item) return;
            nameInput.value = item.name;
            amountInput.value = item.amount;
            dateInput.value = item.date;
            categoryInput.value = item.category;
            editId = id;
            saveBtn.textContent = 'Update Expense';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteExpense(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            saveState();
            renderExpenses();
        }

        clearBtn.addEventListener('click', resetForm);
        expenseForm.addEventListener('submit', addOrUpdateExpense);
        searchInput.addEventListener('input', renderExpenses);
        filterCategory.addEventListener('change', renderExpenses);

        themeToggle.addEventListener('click', () => {
            darkMode = !darkMode;
            document.body.classList.toggle('dark', darkMode);
            themeToggle.textContent = darkMode ? 'Light Mode' : 'Dark Mode';
            saveState();
        });

        function init() {
            document.body.classList.toggle('dark', darkMode);
            themeToggle.textContent = darkMode ? 'Light Mode' : 'Dark Mode';
            if (!Array.isArray(expenses)) expenses = [];
            updateDashboard();
            renderExpenses();
            if (!dateInput.value) {
                dateInput.value = new Date().toISOString().split('T')[0];
            }
        }

        window.editExpense = editExpense;
        window.deleteExpense = deleteExpense;
        init();
    </script>
</body>
</html>
